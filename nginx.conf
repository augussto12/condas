server_tokens off;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:;" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html nunca se cachea
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Assets de Vite (tienen hash) se cachean 1 año
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
